<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JB's OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0c0c0f;
    --surface:#141417;
    --surface-hover:#1a1a1e;
    --surface-modal:#1e1e24;
    --border:#252529;
    --border-2:#353539;
    --text:#eaeaf0;
    --text-2:#7e7e8c;
    --text-3:#46464f;
    --accent:#e8a020;
    --accent-h:#f0b030;
    --accent-dim:rgba(232,160,32,.1);
    --accent-dim-h:rgba(232,160,32,.18);
    --green:#4ade80;--green-dim:rgba(74,222,128,.1);
    --blue:#60a5fa;--blue-dim:rgba(96,165,250,.1);
    --purple:#a78bfa;--purple-dim:rgba(167,139,250,.1);
    --pink:#f472b6;--pink-dim:rgba(244,114,182,.1);
    --teal:#2dd4bf;--teal-dim:rgba(45,212,191,.1);
    --orange:#fb923c;--orange-dim:rgba(251,146,60,.1);
    --yellow:#fbbf24;--yellow-dim:rgba(251,191,36,.1);
    --red:#f87171;--red-dim:rgba(248,113,113,.1);
    --radius:7px;--radius-lg:10px;--t:.15s ease;
  }
  html,body{height:100%;font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}
  ::selection{background:var(--accent-dim);color:var(--accent)}

  .app{display:flex;height:100vh;overflow:hidden}
  .sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

  .sb-logo{padding:20px 14px 14px;display:flex;align-items:center;gap:8px}
  .sb-logo-mark{width:22px;height:22px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#111;flex-shrink:0}
  .sb-logo-text{font-size:14px;font-weight:600;letter-spacing:-.3px;color:var(--text)}
  .sb-logo-text span{color:var(--text-2);font-weight:400}

  .sb-section{padding:0 8px 12px}
  .sb-label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);padding:8px 8px 4px}

  .nav-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius);cursor:pointer;color:var(--text-2);transition:background var(--t),color var(--t);font-size:13px;font-weight:450;user-select:none}
  .nav-item:hover{background:var(--surface-hover);color:var(--text)}
  .nav-item.active{background:var(--accent-dim);color:var(--accent)}
  .nav-item.active:hover{background:var(--accent-dim-h)}
  .nav-icon{width:15px;height:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.7}
  .nav-item.active .nav-icon{opacity:1}
  .nav-count{margin-left:auto;font-size:11px;font-weight:500;background:var(--surface-hover);padding:1px 5px;border-radius:9px;color:var(--text-3);min-width:18px;text-align:center}
  .nav-item.active .nav-count{background:var(--accent-dim-h);color:var(--accent)}

  /* Category nav items use a color dot instead of icon */
  .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .nav-item.cat-active{background-color:var(--cat-dim);color:var(--cat-color)}
  .nav-item.cat-active .nav-count{background:var(--cat-dim);color:var(--cat-color)}

  .sb-divider{height:1px;background:var(--border);margin:4px 8px 12px}

  .sb-commands{margin:0 8px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;flex-shrink:0}
  .sb-commands-title{font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:8px}
  .cmd-row{display:flex;align-items:baseline;gap:6px;margin-bottom:4px}
  .cmd-row:last-child{margin-bottom:0}
  .cmd-chip{font-size:10.5px;font-weight:600;color:var(--accent);background:var(--accent-dim);padding:1px 5px;border-radius:4px;white-space:nowrap}
  .cmd-desc{font-size:11px;color:var(--text-3);line-height:1.4}

  .sb-footer{margin-top:auto;padding:12px 8px;border-top:1px solid var(--border)}
  .sb-footer-text{font-size:11px;color:var(--text-3);line-height:1.6}

  .header{padding:18px 24px 0;border-bottom:1px solid var(--border);background:var(--bg)}
  .header-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .page-title{font-size:20px;font-weight:700;letter-spacing:-.4px;color:var(--text);display:flex;align-items:center;gap:8px}
  .page-title-dot{width:10px;height:10px;border-radius:50%;display:none}
  .header-actions{margin-left:auto;display:flex;gap:6px;align-items:center}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:6px 12px;border-radius:var(--radius);border:none;cursor:pointer;font-size:12.5px;font-weight:500;font-family:inherit;transition:background var(--t),color var(--t),transform var(--t);white-space:nowrap}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--accent);color:#111}.btn-primary:hover{background:var(--accent-h)}
  .btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border-2)}.btn-ghost:hover{background:var(--surface-hover);color:var(--text)}

  .search-wrap{background:var(--surface);border:1px solid var(--border);border-bottom:none;border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:0}
  .search-inner{display:flex;align-items:center;gap:8px;padding:9px 14px}
  .search-inner svg{color:var(--text-3);flex-shrink:0}
  .search-inner input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit}
  .search-inner input::placeholder{color:var(--text-3)}

  .add-area{padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg)}
  .add-row{display:flex;gap:6px;align-items:stretch}
  .add-select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0 8px;color:var(--text-2);font-size:12px;font-weight:500;font-family:inherit;outline:none;cursor:pointer;transition:border-color var(--t);height:36px}
  .add-select:focus{border-color:var(--accent);color:var(--text)}
  .add-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color var(--t),background var(--t)}
  .add-input:focus{border-color:var(--accent);background:var(--surface-hover)}
  .add-input::placeholder{color:var(--text-3)}

  .list-area{flex:1;overflow-y:auto;padding:6px 24px 32px}

  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 24px;text-align:center}
  .empty-icon{width:44px;height:44px;background:var(--surface);border-radius:12px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);font-size:18px;color:var(--text-3)}
  .empty-title{font-size:14px;font-weight:600;color:var(--text-2)}
  .empty-hint{font-size:12.5px;color:var(--text-3);line-height:1.5;max-width:300px}
  .empty-hint code{color:var(--accent);font-size:11.5px;background:var(--accent-dim);padding:1px 5px;border-radius:4px}

  .section-head{display:flex;align-items:center;gap:8px;padding:16px 0 8px;user-select:none}
  .section-head-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);white-space:nowrap}
  .section-head-line{flex:1;height:1px;background:var(--border)}

  /* ITEM CARD with left category color bar */
  .item{display:flex;align-items:flex-start;gap:0;border-radius:var(--radius-lg);background:var(--surface);border:1px solid var(--border);margin-bottom:5px;transition:background var(--t),border-color var(--t);cursor:default;overflow:hidden;position:relative}
  .item:hover{background:var(--surface-hover);border-color:var(--border-2)}
  .item.done{opacity:.6}
  .item.done:hover{opacity:.75}
  .item-bar{width:3px;min-width:3px;background:var(--item-cat-color,var(--border-2));flex-shrink:0;align-self:stretch}
  .item-inner{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;flex:1;min-width:0}

  .cb{width:16px;height:16px;min-width:16px;border:1.5px solid var(--border-2);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:background var(--t),border-color var(--t);flex-shrink:0}
  .cb:hover{border-color:var(--accent)}
  .item.done .cb{background:var(--green);border-color:var(--green)}
  .cb-check{display:none}.item.done .cb-check{display:block}

  .item-body{flex:1;min-width:0}
  .item-text{font-size:13.5px;color:var(--text);line-height:1.5;word-break:break-word;font-weight:450}
  .item.done .item-text{text-decoration:line-through;color:var(--text-3)}
  .item-sub{font-size:12px;color:var(--text-2);margin-top:3px;line-height:1.45}
  .item-meta{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-top:6px}

  .badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 7px;border-radius:5px;white-space:nowrap}
  .badge-task{background:var(--blue-dim);color:var(--blue)}
  .badge-idea{background:var(--accent-dim);color:var(--accent)}
  .badge-note{background:var(--purple-dim);color:var(--purple)}
  .badge-project{background:var(--green-dim);color:var(--green)}

  /* Category badge uses inline style for dynamic color */
  .badge-cat{font-size:11px;font-weight:500;padding:2px 7px;border-radius:5px;white-space:nowrap}

  .item-date{font-size:11px;color:var(--text-3)}
  .item-src{font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:3px}
  .prio-high{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--red)}
  .prio-dot{width:5px;height:5px;border-radius:50%;background:currentColor;display:inline-block}

  .item-actions{display:flex;gap:2px;opacity:0;transition:opacity var(--t);margin-top:1px;flex-shrink:0}
  .item:hover .item-actions{opacity:1}
  .del-btn{background:none;border:none;cursor:pointer;color:var(--text-3);padding:3px 5px;border-radius:5px;font-size:12px;transition:color var(--t),background var(--t);font-family:inherit}
  .del-btn:hover{color:var(--red);background:var(--red-dim)}

  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);padding:16px}
  .backdrop.hidden{display:none}
  .modal{background:var(--surface-modal);border:1px solid var(--border-2);border-radius:14px;padding:24px;width:480px;max-width:100%;box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .modal-title{font-size:16px;font-weight:700;letter-spacing:-.3px;margin-bottom:18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:5px}
  .field input,.field textarea,.field select{width:100%;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color var(--t)}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:72px}
  .field-row{display:flex;gap:10px}.field-row .field{flex:1}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

  .toast{position:fixed;bottom:20px;right:20px;background:var(--surface-modal);border:1px solid var(--border-2);border-radius:var(--radius-lg);padding:10px 16px;font-size:13px;color:var(--text);z-index:200;opacity:0;transform:translateY(6px);transition:.18s ease;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.4);max-width:320px}
  .toast.show{opacity:1;transform:translateY(0)}
  .kbd{font-size:10px;color:var(--text-3);background:var(--surface);border:1px solid var(--border-2);border-radius:4px;padding:1px 5px}

  @media(max-width:640px){
    .sidebar{display:none}
    .add-row .add-select:first-child{display:none}
  }
</style>
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-mark">JB</div>
    <div class="sb-logo-text">JB's <span>OS</span></div>
  </div>

  <div class="sb-section">
    <div class="sb-label">Views</div>
    <div class="nav-item active" id="nav-all" onclick="setFilter('all','view')" role="button" tabindex="0">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
      All Items <span class="nav-count" id="cnt-all">0</span>
    </div>
    <div class="nav-item" id="nav-active" onclick="setFilter('active','view')" role="button" tabindex="0">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/></svg>
      Active <span class="nav-count" id="cnt-active">0</span>
    </div>
    <div class="nav-item" id="nav-archive" onclick="setFilter('archive','view')" role="button" tabindex="0">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 5h12v1.5H2zM3 6.5h10l-.8 7H3.8z"/><path d="M6 10h4"/></svg>
      Archive <span class="nav-count" id="cnt-archive">0</span>
    </div>
  </div>

  <div class="sb-divider"></div>

  <div class="sb-section">
    <div class="sb-label">Priority</div>
    <div class="nav-item" id="nav-prio-high" onclick="setFilter('high','prio')" role="button" tabindex="0">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="5" fill="var(--red)" stroke="none" opacity=".85"/></svg>
      <span style="color:var(--red)">High</span> <span class="nav-count" id="cnt-prio-high">0</span>
    </div>
    <div class="nav-item" id="nav-prio-normal" onclick="setFilter('normal','prio')" role="button" tabindex="0">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="5" fill="var(--text-3)" stroke="none" opacity=".7"/></svg>
      Normal <span class="nav-count" id="cnt-prio-normal">0</span>
    </div>
    <div class="nav-item" id="nav-prio-low" onclick="setFilter('low','prio')" role="button" tabindex="0">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="5" fill="var(--text-3)" stroke="none" opacity=".35"/></svg>
      Low <span class="nav-count" id="cnt-prio-low">0</span>
    </div>
  </div>

  <div class="sb-divider"></div>

  <div class="sb-section">
    <div class="sb-label">Life Areas</div>
    <div id="cat-nav"></div>
  </div>

  <div class="sb-divider"></div>

  <div class="sb-section">
    <div class="sb-label">Types</div>
    <div class="nav-item" id="nav-task" onclick="setFilter('task','type')" role="button" tabindex="0">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 8l2.5 2.5L11 5"/></svg>
      Tasks <span class="nav-count" id="cnt-task">0</span>
    </div>
    <div class="nav-item" id="nav-idea" onclick="setFilter('idea','type')" role="button" tabindex="0">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2a4 4 0 0 1 2 7.46V11H6V9.46A4 4 0 0 1 8 2z"/><path d="M6 12h4M7 14h2"/></svg>
      Ideas <span class="nav-count" id="cnt-idea">0</span>
    </div>
    <div class="nav-item" id="nav-note" onclick="setFilter('note','type')" role="button" tabindex="0">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3h10v8l-3 3H3z"/><path d="M6 6h4M6 9h2"/></svg>
      Notes <span class="nav-count" id="cnt-note">0</span>
    </div>
    <div class="nav-item" id="nav-project" onclick="setFilter('project','type')" role="button" tabindex="0">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 13V6l4-3h4l4 3v7H2z"/><path d="M6 13V9h4v4"/></svg>
      Projects <span class="nav-count" id="cnt-project">0</span>
    </div>
  </div>

  <div class="sb-divider"></div>

  <div class="sb-section">
    <div class="sb-label">Telegram</div>
    <div class="sb-commands">
      <div class="cmd-row"><span class="cmd-chip">todo:</span><span class="cmd-desc">Add a task</span></div>
      <div class="cmd-row"><span class="cmd-chip">idea:</span><span class="cmd-desc">Capture an idea</span></div>
      <div class="cmd-row"><span class="cmd-chip">note:</span><span class="cmd-desc">Save a note</span></div>
      <div class="cmd-row"><span class="cmd-chip">project:</span><span class="cmd-desc">Start a project</span></div>
    </div>
  </div>

  <div class="sb-footer">
    <div class="sb-footer-text"><span class="kbd">⌘N</span> new &nbsp;·&nbsp; <span class="kbd">⌘F</span> search &nbsp;·&nbsp; <span class="kbd">Esc</span> close</div>
  </div>
</aside>

<div class="main">
  <div class="header">
    <div class="header-row">
      <div class="page-title" id="page-title">
        <div class="page-title-dot" id="page-title-dot"></div>
        All Items
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost" onclick="importJSON()">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 10v3h12v-3M8 2v8M5 7l3 3 3-3"/></svg>
          <span>Import</span>
        </button>
        <button class="btn btn-ghost" onclick="exportJSON()">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 10v3h12v-3M8 10V2M5 5l3-3 3 3"/></svg>
          <span>Export</span>
        </button>
        <button class="btn btn-primary" onclick="openModal()">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 2v12M2 8h12"/></svg>
          <span>New Item</span>
        </button>
      </div>
    </div>
    <div class="search-wrap">
      <div class="search-inner">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg>
        <input id="search" type="text" placeholder="Search items..." oninput="render()" autocomplete="off" spellcheck="false">
      </div>
    </div>
  </div>

  <div class="add-area">
    <div class="add-row">
      <select class="add-select" id="quick-cat" aria-label="Category" style="max-width:110px"></select>
      <select class="add-select" id="quick-type" aria-label="Type" style="max-width:90px">
        <option value="task">Task</option>
        <option value="idea">Idea</option>
        <option value="note">Note</option>
        <option value="project">Project</option>
      </select>
      <input class="add-input" id="quick-input" placeholder="Quick add — press Enter to save" onkeydown="quickAdd(event)" autocomplete="off" spellcheck="false">
      <button class="btn btn-primary" onclick="quickAdd({key:'Enter'})">Add</button>
    </div>
  </div>

  <div class="list-area" id="list" role="list"></div>
</div>

</div>

<div class="backdrop hidden" id="modal" onclick="closeModalOutside(event)" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-title">New Item</div>
    <div class="field">
      <label for="m-title">Title</label>
      <input id="m-title" placeholder="What's on your mind?" autocomplete="off">
    </div>
    <div class="field">
      <label for="m-notes">Notes <span style="color:var(--text-3);font-weight:400">(optional)</span></label>
      <textarea id="m-notes" placeholder="Any extra context..."></textarea>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="m-cat">Life Area</label>
        <select id="m-cat"></select>
      </div>
      <div class="field">
        <label for="m-type">Type</label>
        <select id="m-type">
          <option value="task">Task</option>
          <option value="idea">Idea</option>
          <option value="note">Note</option>
          <option value="project">Project</option>
        </select>
      </div>
      <div class="field">
        <label for="m-priority">Priority</label>
        <select id="m-priority">
          <option value="normal">Normal</option>
          <option value="high">High</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addFromModal()">Add Item</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
const KEY = 'claude_notes_v3';

const CATS = {
  work:     {label:'Work',         color:'#60a5fa', dim:'rgba(96,165,250,.12)'},
  personal: {label:'Personal',     color:'#a78bfa', dim:'rgba(167,139,250,.12)'},
  family:   {label:'Family',       color:'#4ade80', dim:'rgba(74,222,128,.12)'},
  kids:     {label:'Kids',         color:'#f472b6', dim:'rgba(244,114,182,.12)'},
  finance:  {label:'Finance',      color:'#fbbf24', dim:'rgba(251,191,36,.12)'},
  tech:     {label:'Tech',         color:'#38bdf8', dim:'rgba(56,189,248,.12)'},
  shopping: {label:'Shopping',     color:'#fb923c', dim:'rgba(251,146,60,.12)'},
  errands:  {label:'Errands',      color:'#f472b6', dim:'rgba(244,114,182,.12)'},
  lifestyle:{label:'Lifestyle',    color:'#fb923c', dim:'rgba(251,146,60,.12)'},
  health:   {label:'Health',       color:'#2dd4bf', dim:'rgba(45,212,191,.12)'},
  musubi:   {label:'Musubi Strong',color:'#f87171', dim:'rgba(248,113,113,.12)'},
  general:  {label:'General',      color:'#7e7e8c', dim:'rgba(126,126,140,.12)'},
};

const TYPE_LABEL = {task:'Task',idea:'Idea',note:'Note',project:'Project'};
const SRC_LABEL  = {telegram:'via Telegram',browser:'added manually'};

function load(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch{return [];}}
function save(d){localStorage.setItem(KEY,JSON.stringify(d));}

let filter='all', filterMode='view';

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

function buildCatOptions(selId){
  const sel=document.getElementById(selId);
  if(!sel)return;
  sel.innerHTML=Object.entries(CATS).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
}

function buildCatNav(){
  const el=document.getElementById('cat-nav');
  el.innerHTML=Object.entries(CATS).map(([k,v])=>`
    <div class="nav-item" id="nav-cat-${k}" onclick="setFilter('${k}','cat')" role="button" tabindex="0"
         style="--cat-color:${v.color};--cat-dim:${v.dim}">
      <span class="cat-dot" style="background:${v.color}"></span>
      ${v.label} <span class="nav-count" id="cnt-cat-${k}">0</span>
    </div>`).join('');
}

function addItem(text, type='task', notes='', source='browser', priority='normal', category='general'){
  if(!text.trim())return;
  const items=load();
  items.unshift({id:uid(),text:text.trim(),notes:notes.trim(),type,priority,source,category,done:false,createdAt:new Date().toISOString()});
  save(items);render();updateCounts();
  toast('Added: '+text.slice(0,48));
}

function toggleDone(id){
  const items=load();const i=items.findIndex(x=>x.id===id);if(i<0)return;
  items[i].done=true;
  items[i].archived=true;
  items[i].archivedAt=new Date().toISOString();
  save(items);render();updateCounts();
  toast('Done — moved to Archive');
}

function restore(id){
  const items=load();const i=items.findIndex(x=>x.id===id);if(i<0)return;
  items[i].done=false;items[i].archived=false;delete items[i].archivedAt;
  save(items);render();updateCounts();
  toast('Restored to active list');
}

function del(id){save(load().filter(x=>x.id!==id));render();updateCounts();toast('Deleted');}

function setFilter(f, mode){
  filter=f; filterMode=mode;
  document.querySelectorAll('.nav-item').forEach(e=>{e.classList.remove('active');e.classList.remove('cat-active');});
  const el=document.getElementById('nav-'+(mode==='cat'?'cat-':'')+f);
  if(el){
    if(mode==='cat'){el.classList.add('cat-active');}else{el.classList.add('active');}
  }
  const cat=CATS[f];
  const dot=document.getElementById('page-title-dot');
  if(mode==='cat'&&cat){
    dot.style.display='block';dot.style.background=cat.color;
    document.getElementById('page-title').lastChild.textContent=' '+cat.label;
  } else if(mode==='prio'){
    const prioColors={high:'var(--red)',normal:'var(--text-2)',low:'var(--text-3)'};
    const prioTitles={high:'High Priority',normal:'Normal Priority',low:'Low Priority'};
    dot.style.display='block';dot.style.background=prioColors[f]||'var(--text-3)';
    document.getElementById('page-title').lastChild.textContent=' '+prioTitles[f];
  } else {
    dot.style.display='none';
    const titles={all:'All Items',active:'Active Items',archive:'Archive',task:'Tasks',idea:'Ideas',note:'Notes',project:'Projects'};
    document.getElementById('page-title').lastChild.textContent=titles[f]||'All Items';
  }
  render();
}

const PRIO_ORDER={high:0,normal:1,low:2};
function sortByPriority(arr){
  return arr.slice().sort((a,b)=>(PRIO_ORDER[a.priority]??1)-(PRIO_ORDER[b.priority]??1));
}

function getFiltered(){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const items=load().filter(item=>{
    const mq=!q||item.text.toLowerCase().includes(q)||(item.notes||'').toLowerCase().includes(q);
    const isArchived=!!item.archived;
    let mf;
    if(filterMode==='view'){
      if(filter==='archive') mf=isArchived;
      else if(filter==='all') mf=!isArchived;
      else if(filter==='active') mf=!isArchived&&!item.done;
      else mf=false;
    } else if(filterMode==='type'){
      mf=!isArchived&&item.type===filter;
    } else if(filterMode==='prio'){
      mf=!isArchived&&(item.priority||'normal')===filter;
    } else {
      mf=!isArchived&&(item.category||'general')===filter;
    }
    return mq&&mf;
  });
  return sortByPriority(items);
}

function ageStr(iso){
  const d=new Date(iso),n=new Date(),diff=n-d;
  if(diff<60000)return 'just now';
  if(diff<3600000)return Math.floor(diff/60000)+'m ago';
  if(diff<86400000)return Math.floor(diff/3600000)+'h ago';
  if(diff<604800000)return Math.floor(diff/86400000)+'d ago';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function itemHTML(item, isArchiveView){
  const cat=CATS[item.category||'general']||CATS.general;
  const typeBadge=`<span class="badge badge-${item.type}">${TYPE_LABEL[item.type]||item.type}</span>`;
  const catBadge=`<span class="badge-cat" style="background:${cat.dim};color:${cat.color}">${cat.label}</span>`;
  const prio=item.priority==='high'?`<span class="prio-high"><span class="prio-dot"></span>High</span>`:'';
  const src=`<span class="item-src">${item.source==='telegram'?'↗':'·'} ${SRC_LABEL[item.source]||item.source}</span>`;
  const notes=item.notes?`<div class="item-sub">${esc(item.notes)}</div>`:'';
  const archivedDate=item.archivedAt?`<span class="item-date">done ${ageStr(item.archivedAt)}</span>`:'';
  const actions=isArchiveView
    ?`<button class="del-btn restore-btn" onclick="restore('${item.id}')" title="Restore to active" aria-label="Restore item" style="color:var(--green)">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l3.5-3.5M3 8l3.5 3.5M3 8h9a2 2 0 0 1 0 4H9"/></svg>
      </button>
      <button class="del-btn" onclick="del('${item.id}')" title="Delete permanently" aria-label="Delete item">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10"/></svg>
      </button>`
    :`<button class="del-btn" onclick="del('${item.id}')" title="Delete" aria-label="Delete item">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10"/></svg>
      </button>`;
  const checkEl=isArchiveView
    ?`<div class="cb cb-done" style="background:var(--green);border-color:var(--green);cursor:default">
        <svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="#111" stroke-width="2.2"><path d="M1.5 5l2.8 2.8 4.2-5"/></svg>
      </div>`
    :`<div class="cb" onclick="toggleDone('${item.id}')" role="checkbox" aria-checked="false" tabindex="0" onkeydown="if(event.key===' '||event.key==='Enter'){toggleDone('${item.id}');event.preventDefault()}">
        <svg class="cb-check" width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="#111" stroke-width="2.2"><path d="M1.5 5l2.8 2.8 4.2-5"/></svg>
      </div>`;
  const opacity=isArchiveView?'opacity:.55;':'';
  return`<div class="item" id="item-${item.id}" role="listitem" style="--item-cat-color:${cat.color};${opacity}">
    <div class="item-bar"></div>
    <div class="item-inner">
      ${checkEl}
      <div class="item-body">
        <div class="item-text" style="${isArchiveView?'text-decoration:line-through;color:var(--text-3)':''}">${esc(item.text)}</div>
        ${notes}
        <div class="item-meta">${catBadge}${typeBadge}${prio}${isArchiveView?archivedDate:`<span class="item-date">${ageStr(item.createdAt)}</span>`}${src}</div>
      </div>
      <div class="item-actions">${actions}</div>
    </div>
  </div>`;
}

function render(){
  const all=getFiltered();
  const el=document.getElementById('list');
  const isArchiveView=filter==='archive';
  if(!all.length){
    const hint=isArchiveView
      ?'Items you check off will appear here for future reference.'
      :'Quick-add above, press ⌘N, or send <code>todo: your task</code> via Telegram';
    const icon=isArchiveView?'▣':'◈';
    const title=isArchiveView?'Archive is empty':'Nothing here yet';
    el.innerHTML=`<div class="empty-state">
      <div class="empty-icon">${icon}</div>
      <div class="empty-title">${title}</div>
      <div class="empty-hint">${hint}</div>
    </div>`;
    return;
  }
  let html='';
  if(isArchiveView){
    html+=`<div class="section-head"><span class="section-head-label">Archived · ${all.length}</span><div class="section-head-line"></div></div>`;
    html+=all.map(i=>itemHTML(i,true)).join('');
  } else {
    html+=`<div class="section-head"><span class="section-head-label">Active · ${all.length}</span><div class="section-head-line"></div></div>`;
    html+=all.map(i=>itemHTML(i,false)).join('');
  }
  el.innerHTML=html;
}

function updateCounts(){
  const items=load();
  const active=items.filter(x=>!x.archived);
  const archived=items.filter(x=>!!x.archived);
  const c={
    all:active.length,
    active:active.filter(x=>!x.done).length,
    archive:archived.length,
    task:active.filter(x=>x.type==='task').length,
    idea:active.filter(x=>x.type==='idea').length,
    note:active.filter(x=>x.type==='note').length,
    project:active.filter(x=>x.type==='project').length
  };
  Object.entries(c).forEach(([k,v])=>{const e=document.getElementById('cnt-'+k);if(e)e.textContent=v;});
  Object.keys(CATS).forEach(k=>{
    const e=document.getElementById('cnt-cat-'+k);
    if(e)e.textContent=active.filter(x=>(x.category||'general')===k).length;
  });
  ['high','normal','low'].forEach(p=>{
    const e=document.getElementById('cnt-prio-'+p);
    if(e)e.textContent=active.filter(x=>(x.priority||'normal')===p).length;
  });
}

function quickAdd(e){
  if(e.key!=='Enter')return;
  const inp=document.getElementById('quick-input');
  const text=inp.value.trim();if(!text)return;
  const type=document.getElementById('quick-type').value;
  const cat=document.getElementById('quick-cat').value;
  addItem(text,type,'','browser','normal',cat);
  inp.value='';
}

function openModal(){
  document.getElementById('modal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('m-title').focus(),50);
}
function closeModal(){document.getElementById('modal').classList.add('hidden');}
function closeModalOutside(e){if(e.target.id==='modal')closeModal();}
function addFromModal(){
  const t=document.getElementById('m-title').value.trim();if(!t)return;
  addItem(t,document.getElementById('m-type').value,document.getElementById('m-notes').value,'browser',
    document.getElementById('m-priority').value,document.getElementById('m-cat').value);
  document.getElementById('m-title').value='';
  document.getElementById('m-notes').value='';
  closeModal();
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if((e.metaKey||e.ctrlKey)&&e.key==='n'){e.preventDefault();openModal();}
  if((e.metaKey||e.ctrlKey)&&e.key==='f'){e.preventDefault();document.getElementById('search').focus();}
});

function exportJSON(){
  const blob=new Blob([JSON.stringify(load(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='claude-notes.json';a.click();
  toast('Exported');
}

function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!Array.isArray(d)){toast('Invalid format');return;}
        const existing=load();const ids=new Set(existing.map(x=>x.id));
        const fresh=d.filter(x=>!ids.has(x.id));
        save([...fresh,...existing]);render();updateCounts();
        toast(`Imported ${fresh.length} item${fresh.length!==1?'s':''}`);
      }catch{toast('Failed to parse JSON');}
    };
    r.readAsText(e.target.files[0]);
  };
  inp.click();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let _toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

/* Migrate old items: v2 key (no category) + mark done items as archived */
(function migrate(){
  const OLD='claude_notes_v2';
  try{
    const old=JSON.parse(localStorage.getItem(OLD));
    if(Array.isArray(old)&&old.length){
      const cur=load();const ids=new Set(cur.map(x=>x.id));
      const fresh=old.filter(x=>!ids.has(x.id)).map(x=>({...x,category:x.category||'general'}));
      if(fresh.length){save([...fresh,...cur]);localStorage.removeItem(OLD);}
    }
  }catch{}
  // Mark any done-but-not-archived items as archived
  try{
    const items=load();
    let changed=false;
    items.forEach(x=>{if(x.done&&!x.archived){x.archived=true;x.archivedAt=x.updatedAt||x.createdAt;changed=true;}});
    if(changed)save(items);
  }catch{}
})();

/* URL import: ?add=base64encodedJSON */
(function checkURLImport(){
  const p=new URLSearchParams(location.search);
  if(!p.has('add'))return;
  try{
    const d=JSON.parse(atob(p.get('add')));
    if(Array.isArray(d)){
      const existing=load();const ids=new Set(existing.map(x=>x.id));
      const fresh=d.filter(x=>!ids.has(x.id)).map(x=>({...x,category:x.category||'general'}));
      save([...fresh,...existing]);
      if(fresh.length)toast(`Added ${fresh.length} item${fresh.length!==1?'s':''} from Telegram`);
    }
  }catch{}
  history.replaceState({},'',location.pathname);
})();

/* Server sync: fetch todos.json and merge into localStorage (new IDs only) */
(function fetchServerTodos(){
  fetch('todos.json?v='+Date.now())
    .then(r=>r.ok?r.json():Promise.reject())
    .then(serverItems=>{
      if(!Array.isArray(serverItems)||!serverItems.length)return;
      const local=load();
      const localIds=new Set(local.map(x=>x.id));
      // Remap legacy category names
      const catRemap={errands:'errands',shopping:'shopping',tech:'tech'};
      const fresh=serverItems
        .filter(x=>!localIds.has(x.id))
        .map(x=>({
          ...x,
          category: catRemap[x.category]||x.category||'general',
          source: x.source||'telegram',
          type: x.type||'task',
        }));
      // Also update done state for existing items if server marks them done
      let changed=fresh.length>0;
      const merged=[...fresh,...local.map(loc=>{
        const srv=serverItems.find(s=>s.id===loc.id);
        if(srv&&srv.done&&!loc.archived){
          changed=true;
          return{...loc,done:true,archived:true,archivedAt:loc.archivedAt||new Date().toISOString()};
        }
        return loc;
      })];
      if(changed){save(merged);render();updateCounts();}
    })
    .catch(()=>{/* offline or local dev — use localStorage only */});
})();

/* Init */
buildCatOptions('quick-cat');
buildCatOptions('m-cat');
buildCatNav();
render();
updateCounts();

/* Fix page title structure for the dot */
(function(){
  const pt=document.getElementById('page-title');
  const dot=document.getElementById('page-title-dot');
  const text=document.createTextNode('All Items');
  pt.innerHTML='';pt.appendChild(dot);pt.appendChild(text);
})();
</script>
</body>
</html>
